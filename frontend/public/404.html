<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>404 • Fak'ugesi Festival 2026</title>
  <style>
    @font-face { font-family:'InterDisplay'; src:url('fonts/InterDisplay-Regular.otf') format('opentype'); font-weight:400; }
    @font-face { font-family:'InterDisplay'; src:url('fonts/InterDisplay-Bold.otf') format('opentype'); font-weight:700; }
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0d1117;color:#fff;font-family:'InterDisplay',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding-top:56px}
    .code{font-size:clamp(80px,15vw,160px);font-weight:700;letter-spacing:-0.05em;line-height:1;color:rgba(255,255,255,0.08)}
    .msg{font-size:clamp(24px,4vw,36px);font-weight:700;margin-top:16px;letter-spacing:-0.02em}
    .sub{font-size:14px;color:rgba(255,255,255,0.45);margin-top:12px;margin-bottom:40px}
    .home-btn{background:#fff;color:#000;padding:12px 32px;font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;text-decoration:none}
    .home-btn:hover{background:#d4e600}
  </style>
</head>
<body>
<div class="code">404</div>
<div class="msg">Page not found</div>
<p class="sub">The page you're looking for doesn't exist or has moved.</p>
<a class="home-btn" href="index.html">← Back to Home</a>
<script src="nav.js"></script>
</body>
</html>
